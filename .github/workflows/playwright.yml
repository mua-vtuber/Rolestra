name: Playwright Electron E2E

# R10-Task13 + R11-Task4: cross-OS Electron E2E matrix.
#
# Triggers manually via workflow_dispatch and on push to main. PR runs are
# explicitly NOT enabled by default — Electron E2E on hosted runners burns
# minutes (especially macOS); R11-Task14 splits PR triggers (Win + Linux
# only) from a weekly macOS cron and lands a usage-report workflow.
#
# Matrix:
#   - 3 OS  : ubuntu-latest, windows-latest, macos-latest
#   - 9 spec: approval-flow, autonomy-queue-flow, dm-flow,
#             external-project-flow, meeting-flow, member-profile-flow,
#             messenger-flow, search-flow, settings-tabs-flow
#
# 9 × 3 = 27 cells. R11-Task4 added `search-flow` (R10 Known Concern #3)
# and `dm-flow` (Known Concern #3) and activated `autonomy-queue-flow`
# Step C end-to-end via the `__rolestraDevHooks` preload bridge (Known
# Concern #2). The closeout in Task 16 verifies all 27 cells green from a
# workflow_dispatch run + signs off on the 12 native screenshots.

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  e2e:
    name: ${{ matrix.spec }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        spec:
          - approval-flow
          - autonomy-queue-flow
          - dm-flow
          - external-project-flow
          - meeting-flow
          - member-profile-flow
          - messenger-flow
          - search-flow
          - settings-tabs-flow
    env:
      ROLESTRA_E2E: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npm run rebuild:electron

      - name: Install Playwright (Electron transport)
        run: npx playwright install --with-deps

      - name: Build renderer + main bundles
        run: npm run build

      # Linux needs a virtual framebuffer for Electron windows.
      - name: Run E2E (Linux + xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum -- npx playwright test e2e/${{ matrix.spec }}.spec.ts --config e2e/playwright.config.ts

      - name: Run E2E (macOS / Windows)
        if: runner.os != 'Linux'
        run: npx playwright test e2e/${{ matrix.spec }}.spec.ts --config e2e/playwright.config.ts

      - name: Upload Playwright artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.os }}-${{ matrix.spec }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
