<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Rolestra · Approvals — 3 themes × 2 modes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#f0eee9">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#f0eee9"/>
    <g transform="translate(200,200)">
      <rect x="0" y="0" width="360" height="440" fill="#fff" stroke="#d9cbb3" stroke-width="2"/>
      <rect x="370" y="0" width="430" height="440" fill="#fbf7f0" stroke="#d9cbb3" stroke-width="2"/>
      <rect x="0" y="0" width="360" height="60" fill="#f4ecd6"/>
      <rect x="20" y="85" width="320" height="90" fill="#fff8ef" stroke="#e6bf8f"/>
      <rect x="20" y="185" width="320" height="90" fill="none" stroke="#d9cbb3"/>
      <rect x="20" y="285" width="320" height="90" fill="none" stroke="#d9cbb3"/>
    </g>
    <text x="600" y="690" font-family="serif" font-size="38" fill="#2a1f14" text-anchor="middle" font-weight="600">결재함</text>
  </svg>
</template>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="theme-tokens.jsx"></script>
<script type="text/babel" src="shared-components.jsx"></script>
<!-- 01-dash-variants: DashCard / DashMiniBtn 재사용 (shared 이전은 시안 안정 후 진행 — A 옵션 유지) -->
<script type="text/babel" src="01-dash-variants.jsx"></script>
<script type="text/babel" src="03-apv-variants.jsx"></script>

<script type="text/babel">
const W = 1280, H = 820;
function App() {
  return (
    <DesignCanvas>
      <div style={{ padding: '0 60px 36px', maxWidth: 1600 }}>
        <div style={{ fontSize: 34, fontWeight: 700, letterSpacing: -0.8,
          fontFamily: '"Fraunces", serif', color: '#2a1f14' }}>03. 결재함 — 3 테마 × 2 모드</div>
        <div style={{ fontSize: 14, color: 'rgba(60,50,40,0.65)', marginTop: 8, maxWidth: 860, lineHeight: 1.6 }}>
          대표가 하루 동안 처리할 승인/거절을 모아보는 인박스. 좌측 리스트(대기/허가/거절/전체) + 우측 상세(diff, 맥락, Y/C/N 액션).
        </div>
      </div>
      <DCSection title="Warm">
        <DCArtboard label="Light" width={W} height={H}><AV_WarmLight /></DCArtboard>
        <DCArtboard label="Dark" width={W} height={H}><AV_WarmDark /></DCArtboard>
      </DCSection>
      <DCSection title="Tactical">
        <DCArtboard label="Light" width={W} height={H}><AV_TacticalLight /></DCArtboard>
        <DCArtboard label="Dark" width={W} height={H}><AV_TacticalDark /></DCArtboard>
      </DCSection>
      <DCSection title="Retro">
        <DCArtboard label="Light" width={W} height={H}><AV_RetroLight /></DCArtboard>
        <DCArtboard label="Dark" width={W} height={H}><AV_RetroDark /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
