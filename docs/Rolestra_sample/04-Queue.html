<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Rolestra · Queue — 3 themes × 2 modes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#f0eee9}*{box-sizing:border-box}</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#f0eee9">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#f0eee9"/>
    <g transform="translate(200,180)">
      <rect x="0" y="0" width="800" height="70" fill="#fff8ef" stroke="#c7a87a" stroke-width="2"/>
      <rect x="0" y="90" width="800" height="90" fill="#fff" stroke="#d9941f" stroke-width="2"/>
      <rect x="0" y="200" width="800" height="48" fill="#fff" stroke="#d9cbb3"/>
      <rect x="0" y="258" width="800" height="48" fill="#fff" stroke="#d9cbb3"/>
      <rect x="0" y="316" width="800" height="48" fill="#fff" stroke="#d9cbb3"/>
      <rect x="0" y="374" width="800" height="48" fill="#fff" stroke="#d9cbb3"/>
      <circle cx="140" cy="224" r="6" fill="#7a8f4e"/>
      <circle cx="140" cy="282" r="6" fill="#d9941f"/>
      <circle cx="140" cy="340" r="6" fill="#b8b2a5"/>
      <circle cx="140" cy="398" r="6" fill="#c2553d"/>
    </g>
    <text x="600" y="680" font-family="serif" font-size="38" fill="#2a1f14" text-anchor="middle" font-weight="600">작업 큐</text>
  </svg>
</template>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="theme-tokens.jsx"></script>
<script type="text/babel" src="shared-components.jsx"></script>
<!-- 01-dash-variants: DashCard / DashMiniBtn 재사용 (shared 이전은 시안 안정 후 진행 — A 옵션 유지) -->
<script type="text/babel" src="01-dash-variants.jsx"></script>
<script type="text/babel" src="04-q-variants.jsx"></script>
<script type="text/babel">
const W=1280,H=820;
function App(){return(
  <DesignCanvas>
    <div style={{padding:'0 60px 36px',maxWidth:1600}}>
      <div style={{fontSize:34,fontWeight:700,letterSpacing:-0.8,fontFamily:'"Fraunces",serif',color:'#2a1f14'}}>04. 작업 큐 — 3 테마 × 2 모드</div>
      <div style={{fontSize:14,color:'rgba(60,50,40,0.65)',marginTop:8,maxWidth:860,lineHeight:1.6}}>
        대표가 내린 지시사항이 큐에 쌓이고 한 건씩 실행됩니다. 상단 통계 + 현재 작업 스포트라이트 + 전체 테이블(완료/진행/대기/실패).
      </div>
    </div>
    <DCSection title="Warm"><DCArtboard label="Light" width={W} height={H}><QV_WarmLight/></DCArtboard><DCArtboard label="Dark" width={W} height={H}><QV_WarmDark/></DCArtboard></DCSection>
    <DCSection title="Tactical"><DCArtboard label="Light" width={W} height={H}><QV_TacticalLight/></DCArtboard><DCArtboard label="Dark" width={W} height={H}><QV_TacticalDark/></DCArtboard></DCSection>
    <DCSection title="Retro"><DCArtboard label="Light" width={W} height={H}><QV_RetroLight/></DCArtboard><DCArtboard label="Dark" width={W} height={H}><QV_RetroDark/></DCArtboard></DCSection>
  </DesignCanvas>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
