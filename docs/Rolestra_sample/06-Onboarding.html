<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<!-- 01-dash-variants: DashCard / DashMiniBtn 재사용 (shared 이전은 시안 안정 후 진행 — A 옵션 유지) -->
<script type="text/babel" src="01-dash-variants.jsx"></script>
<script type="text/babel" src="06-ob-variants.jsx"></script>
<script type="text/babel">
const W=1280,H=820;
function App(){return(
  <DesignCanvas>
    <div style={{padding:'0 60px 36px',maxWidth:1600}}>
      <div style={{fontSize:34,fontWeight:700,letterSpacing:-0.8,fontFamily:'"Fraunces",serif',color:'#2a1f14'}}>06. 온보딩 — 3 테마 × 2 모드</div>

      </div>
    </div>
    <DCSection title="Warm"><DCArtboard label="Light" width={W} height={H}><OV_WarmLight/></DCArtboard><DCArtboard label="Dark" width={W} height={H}><OV_WarmDark/></DCArtboard></DCSection>
    <DCSection title="Tactical"><DCArtboard label="Light" width={W} height={H}><OV_TacticalLight/></DCArtboard><DCArtboard label="Dark" width={W} height={H}><OV_TacticalDark/></DCArtboard></DCSection>
    <DCSection title="Retro"><DCArtboard label="Light" width={W} height={H}><OV_RetroLight/></DCArtboard><DCArtboard label="Dark" width={W} height={H}><OV_RetroDark/></DCArtboard></DCSection>
  </DesignCanvas>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
